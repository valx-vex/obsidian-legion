name: CI

on:
  push:
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[all]" ruff build

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest -q

  install-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Install wheel in clean environment
        run: |
          python -m venv .venv-smoke
          .venv-smoke/bin/pip install dist/*.whl

      - name: Smoke test CLI install
        run: |
          VAULT_ROOT="$(mktemp -d)"
          mkdir -p "$VAULT_ROOT/.obsidian" "$VAULT_ROOT/06-daily/action-points"
          .venv-smoke/bin/obsidian-legion --help
          .venv-smoke/bin/obsidian-legion doctor --format json --vault-root "$VAULT_ROOT"
